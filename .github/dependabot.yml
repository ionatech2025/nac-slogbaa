# =============================================================================
# SLOGBAA Dependabot — Automated dependency updates
# =============================================================================

version: 2

updates:
  # Frontend (npm/bun)
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    groups:
      react:
        patterns: ["react", "react-dom", "react-router-dom"]
      tanstack:
        patterns: ["@tanstack/*"]
      editorjs:
        patterns: ["@editorjs/*"]

  # Backend (Gradle)
  - package-ecosystem: gradle
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    groups:
      spring:
        patterns: ["org.springframework*"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci

# =============================================================================
# SLOGBAA CI Pipeline — March 2026
# Runs on: push to main, all PRs
# Jobs: frontend lint+build+test, backend build+test (Gradle)
# =============================================================================

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: '21'
  BUN_VERSION: '1.3'
  NODE_ENV: production

jobs:
  # ─────────────────────────────────────────────
  # Frontend: Lint, Type Check, Build, Test
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block merge conflict markers in frontend
        run: |
          set -e
          if grep -RInE '^<<<<<<< |^>>>>>>> ' src/ 2>/dev/null; then
            echo "::error::Remove Git merge markers (<<<<<<< / >>>>>>>) from frontend/src before pushing."
            exit 1
          fi
          echo "OK — no conflict markers in frontend/src"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify build output
        run: |
          echo "── Build output ──"
          ls -lh dist/assets/*.js | head -5
          echo ""
          echo "── Bundle size check ──"
          # Vite may emit multiple index-*.js chunks; use largest entry chunk
          INITIAL=0
          for f in dist/assets/index-*.js; do
            [ -f "$f" ] || continue
            sz=$(stat -c%s "$f")
            [ "$sz" -gt "$INITIAL" ] && INITIAL=$sz
          done
          echo "Largest index-*.js chunk: ${INITIAL} bytes"
          if [ "$INITIAL" -gt 100000 ]; then
            echo "⚠ Largest index chunk > 100 KB — review code splitting"
          else
            echo "✓ Initial chunk within budget"
          fi

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─────────────────────────────────────────────
  # Backend: Gradle Build + Test
  # ─────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: slogbaa_test
          POSTGRES_USER: slogbaa_test
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U slogbaa_test -d slogbaa_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Compile
        run: ./gradlew classes --no-daemon

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test
          DATASOURCE_URL: jdbc:postgresql://localhost:5432/slogbaa_test
          DATASOURCE_USERNAME: slogbaa_test
          DATASOURCE_PASSWORD: testpassword
          JWT_SECRET: ci-test-secret-key-minimum-32-characters-long

      - name: Build bootJar
        run: ./gradlew :app:bootJar --no-daemon

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/**/build/reports/tests/
          retention-days: 7

      - name: Upload JAR artifact
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/app/build/libs/*.jar
          retention-days: 7

  # ─────────────────────────────────────────────
  # Security: Dependency audit
  # ─────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Audit frontend dependencies
        working-directory: frontend
        run: bun audit 2>/dev/null || echo "Bun audit not available — skipping"
        continue-on-error: true

  # ─────────────────────────────────────────────
  # Summary gate
  # ─────────────────────────────────────────────
  ci-pass:
    name: CI Pass
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.frontend.result }}" != "success" ] || [ "${{ needs.backend.result }}" != "success" ]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ All CI checks passed"

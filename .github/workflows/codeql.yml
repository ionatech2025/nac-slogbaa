# =============================================================================
# SLOGBAA CodeQL Security Analysis — March 2026
#
# PREREQUISITE: Code scanning must be enabled in repository settings:
#   Settings > Code security and analysis > Code scanning > Set up
#   (Private repos require GitHub Advanced Security license at org level)
#
# Scans JavaScript/TypeScript and Java/Kotlin using security-extended queries.
# Resilient to code scanning not being enabled (falls back to artifact upload).
# Fork PRs: analysis runs but SARIF upload is skipped (GitHub security model).
#
# TEMPORARY (Mar 2026): Automatic runs disabled — same CodeQL findings were
# blocking merges without new signal. Run manually via Actions → CodeQL →
# Run workflow, or restore push/PR/schedule below when you want gating again.
# =============================================================================

name: CodeQL

on:
  workflow_dispatch:
  # push:
  #   branches: [main, dev]
  # pull_request:
  #   branches: [main, dev]
  # schedule:
  #   - cron: '0 6 * * 1'  # Weekly Monday 6 AM UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none          # JS/TS needs no compilation
          - language: java-kotlin
            build-mode: manual        # Java requires explicit Gradle build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Fork PR detection ──────────────────────────────────────────────
      # Fork PRs run analysis but cannot upload SARIF (no write access).
      - name: Detect fork PR
        id: fork-check
        run: |
          IS_FORK="false"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            HEAD="${{ github.event.pull_request.head.repo.full_name }}"
            BASE="${{ github.repository }}"
            if [ "$HEAD" != "$BASE" ]; then
              IS_FORK="true"
              echo "::notice::Fork PR detected — SARIF upload will be skipped"
            fi
          fi
          echo "is_fork=${IS_FORK}" >> "$GITHUB_OUTPUT"

      - name: Setup Java (for Java analysis)
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended
          config: |
            threat-models:
              - remote
              - local

      - name: Build Java (for CodeQL tracing)
        if: matrix.language == 'java-kotlin' && matrix.build-mode == 'manual'
        working-directory: backend
        run: ./gradlew classes --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false

      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
          output: sarif-results
        continue-on-error: true

      - name: Upload SARIF as artifact (fallback when code scanning unavailable)
        if: steps.analyze.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: sarif-results/**/*.sarif
          retention-days: 30

      - name: Diagnostic — code scanning setup guidance
        if: steps.analyze.outcome == 'failure'
        run: |
          echo "::warning::CodeQL SARIF upload failed for ${{ matrix.language }}."
          echo ""
          echo "───────────────────────────────────────────────────────────"
          echo "  CODE SCANNING SETUP REQUIRED"
          echo "───────────────────────────────────────────────────────────"
          echo ""
          echo "  The analysis ran successfully, but results could not be"
          echo "  uploaded to the Code Scanning tab. This happens when:"
          echo ""
          echo "  1. Code scanning is not enabled for this repository."
          echo "     Fix: Settings > Code security and analysis"
          echo "          > Code scanning > Set up"
          echo ""
          echo "  2. For private repos, GitHub Advanced Security (GHAS)"
          echo "     must be enabled at the organization level first."
          echo ""
          echo "  3. Fork PRs cannot upload SARIF (GitHub security model)."
          echo ""
          echo "  SARIF results saved as build artifact for manual review."
          echo "  Docs: https://docs.github.com/en/code-security/code-scanning"
          echo "───────────────────────────────────────────────────────────"

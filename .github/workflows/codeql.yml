# =============================================================================
# SLOGBAA CodeQL Security Analysis — March 2026
# Scans JavaScript and Java for vulnerabilities
# =============================================================================

name: CodeQL

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6 AM UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, java-kotlin]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (for Java analysis)
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Build Java (for CodeQL)
        if: matrix.language == 'java-kotlin'
        working-directory: backend
        run: ./gradlew classes --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

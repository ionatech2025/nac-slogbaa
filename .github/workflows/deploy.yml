# =============================================================================
# SLOGBAA Deploy Pipeline — Render
# Triggers: push to dev/main, PRs (build check only), manual dispatch
# =============================================================================

name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  push:
    branches: [main, dev]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'backend/**'

concurrency:
  group: deploy-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  RENDER_SERVICE_ID: srv-d6s383ma2pns73811a20

jobs:
  # ─────────────────────────────────────────────
  # Build + Push Docker Images
  # ─────────────────────────────────────────────
  build-images:
    name: Build Images
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      backend-tag: ${{ steps.meta-backend.outputs.tags }}
      frontend-tag: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─────────────────────────────────────────────
  # Deploy backend to Render
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Render
    needs: [build-images]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: ${{ (github.ref_name == 'main' || github.event.inputs.environment == 'production') && 'production' || 'staging' }}
      url: https://slogbaa-backend.onrender.com

    steps:
      - name: Trigger Render deploy
        id: deploy
        run: |
          RESPONSE=$(curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ env.RENDER_SERVICE_ID }}/deploys" \
            -d '{"clearCache": "do_not_clear"}')

          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "Render deploy triggered: $DEPLOY_ID"

      - name: Wait for deploy to finish
        run: |
          DEPLOY_ID="${{ steps.deploy.outputs.deploy_id }}"
          echo "Waiting for deploy $DEPLOY_ID ..."

          for i in $(seq 1 60); do
            STATUS=$(curl -sf \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${{ env.RENDER_SERVICE_ID }}/deploys/$DEPLOY_ID" \
              | jq -r '.status')

            echo "  [$i/60] Status: $STATUS"

            case "$STATUS" in
              live)
                echo "Deploy is live!"
                exit 0
                ;;
              deactivated|build_failed|update_failed|canceled|pre_deploy_failed)
                echo "Deploy failed with status: $STATUS"
                exit 1
                ;;
            esac

            sleep 15
          done

          echo "Deploy timed out after 15 minutes"
          exit 1

      - name: Health check
        run: |
          echo "Running health check..."
          for i in $(seq 1 6); do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              "https://slogbaa-backend.onrender.com/actuator/health/readiness" || echo "000")
            echo "  Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 6 attempts"
          exit 1

  # ─────────────────────────────────────────────
  # PR build check (no deploy)
  # ─────────────────────────────────────────────
  pr-check:
    name: PR Build Check
    if: github.event_name == 'pull_request'
    needs: [build-images]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Build verification
        run: |
          echo "Docker build succeeded for PR #${{ github.event.number }}"
          echo "Backend image: ${{ needs.build-images.outputs.backend-tag }}"
          echo "Frontend image: ${{ needs.build-images.outputs.frontend-tag }}"
          echo ""
          echo "Merge to dev/main to trigger deployment to Render."

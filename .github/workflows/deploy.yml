# =============================================================================
# SLOGBAA Deploy Pipeline — Railway
# Triggers: push to dev/main, PRs (build check only), manual dispatch
# =============================================================================

name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  push:
    branches: [main, dev]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'backend/**'

concurrency:
  group: deploy-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  RAILWAY_BACKEND_URL: https://slogbaa-backend-production-ef59.up.railway.app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # Build + Push Docker Images
  # ─────────────────────────────────────────────
  build-images:
    name: Build Images
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      backend-tag: ${{ steps.meta-backend.outputs.tags }}
      frontend-tag: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─────────────────────────────────────────────
  # Deploy backend to Railway
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Railway
    needs: [build-images]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: ${{ (github.ref_name == 'main' || github.event.inputs.environment == 'production') && 'production' || 'staging' }}
      url: ${{ env.RAILWAY_BACKEND_URL }}

    steps:
      - name: Trigger Railway redeploy
        run: |
          echo "Triggering Railway redeploy via deploy webhook..."
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}")

          echo "Response: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Railway deploy webhook returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Railway deploy triggered successfully"

      - name: Wait for deploy
        run: |
          echo "Waiting 90s for Railway to build and deploy..."
          sleep 90

      - name: Health check
        run: |
          echo "Running health check against ${{ env.RAILWAY_BACKEND_URL }}..."
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              "${{ env.RAILWAY_BACKEND_URL }}/actuator/health/readiness" || echo "000")
            echo "  Attempt $i/12: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 15
          done
          echo "::error::Health check failed after 12 attempts (3 minutes)"
          exit 1

  # ─────────────────────────────────────────────
  # PR build check (no deploy)
  # ─────────────────────────────────────────────
  pr-check:
    name: PR Build Check
    if: github.event_name == 'pull_request'
    needs: [build-images]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Build verification
        run: |
          echo "Docker build succeeded for PR #${{ github.event.number }}"
          echo "Backend image: ${{ needs.build-images.outputs.backend-tag }}"
          echo "Frontend image: ${{ needs.build-images.outputs.frontend-tag }}"
          echo ""
          echo "Merge to dev/main to trigger deployment to Railway."

# =============================================================================
# SLOGBAA Deploy Pipeline — Railway
# Triggers: push to dev/main, PRs (build check only), manual dispatch
#
# Independent of CodeQL / Semgrep — deploy-backend is not gated on security.yml.
# paths-ignore only skips workflow when the push changes *only* docs/root *.md.
# =============================================================================

name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
  push:
    branches: [main, dev]
    paths-ignore:
      - "docs/**"
      - "*.md"
  pull_request:
    branches: [main, dev]
    paths:
      - "backend/**"

concurrency:
  group: deploy-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # Build + Push Docker Images
  # ─────────────────────────────────────────────
  build-images:
    name: Build Images
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      backend-tag: ${{ steps.meta-backend.outputs.tags }}
      frontend-tag: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend



  # ─────────────────────────────────────────────
  # PR build check (no deploy)
  # ─────────────────────────────────────────────
  pr-check:
    name: PR Build Check
    if: github.event_name == 'pull_request'
    needs: [build-images]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Build verification
        run: |
          echo "Docker build succeeded for PR #${{ github.event.number }}"
          echo "Backend image: ${{ needs.build-images.outputs.backend-tag }}"
          echo "Frontend image: ${{ needs.build-images.outputs.frontend-tag }}"
          echo ""
          echo "Merge to dev/main to trigger deployment to Railway."

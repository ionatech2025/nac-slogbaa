# =============================================================================
# SLOGBAA Deploy Pipeline — March 2026
# Builds Docker images + deploys (manual trigger or auto on main)
# =============================================================================

name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/codeql.yml'

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  JAVA_VERSION: '21'
  BUN_VERSION: '1.3'

jobs:
  # ─────────────────────────────────────────────
  # Build + Push Docker Images
  # ─────────────────────────────────────────────
  build-images:
    name: Build Images
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      backend-tag: ${{ steps.meta-backend.outputs.tags }}
      frontend-tag: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─────────────────────────────────────────────
  # Deploy to environment
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
    needs: [build-images]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Deploy notification
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          echo "🚀 Deploying to ${ENV}"
          echo "Backend: ${{ needs.build-images.outputs.backend-tag }}"
          echo "Frontend: ${{ needs.build-images.outputs.frontend-tag }}"
          echo ""
          echo "── Deployment steps (customize per hosting) ──"
          echo "1. Pull images from ghcr.io"
          echo "2. Run database migrations"
          echo "3. Rolling restart backend service"
          echo "4. Invalidate CDN cache for frontend"
          echo ""
          echo "Add your deployment commands here (SSH, kubectl, fly deploy, etc.)"

# =============================================================================
# SLOGBAA Security Pipeline — March 2026
#
# PREREQUISITE: Code scanning must be enabled in repository settings for
# SARIF uploads. See codeql.yml header for setup instructions.
#
# Comprehensive security scanning following OWASP SAMM and 2026 DevSecOps:
#   - SAST: CodeQL (separate workflow; auto-runs paused) + Semgrep (paused)
#   - SCA:  OWASP Dependency-Check (Java) + npm audit (JS)
#   - Secrets: TruffleHog + ggshield (GitGuardian)
#   - Container: Trivy image + filesystem scan
#   - SBOM: Syft generation for supply chain transparency
#   - DAST: OWASP ZAP baseline scan (separate workflow, on deploy)
# =============================================================================

name: Security

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 4 AM UTC

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

env:
  JAVA_VERSION: '21'

jobs:
  # ─────────────────────────────────────────────
  # Pre-flight: detect fork PRs (SARIF upload restricted)
  # ─────────────────────────────────────────────
  preflight:
    name: Pre-flight
    runs-on: ubuntu-latest
    timeout-minutes: 2

    outputs:
      can-upload-sarif: ${{ steps.check.outputs.can_upload }}

    steps:
      - name: Check SARIF upload eligibility
        id: check
        run: |
          CAN_UPLOAD="true"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            HEAD="${{ github.event.pull_request.head.repo.full_name }}"
            BASE="${{ github.repository }}"
            if [ "$HEAD" != "$BASE" ]; then
              CAN_UPLOAD="false"
              echo "::notice::Fork PR — SARIF uploads skipped (no write access)"
            fi
          fi
          echo "can_upload=${CAN_UPLOAD}" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────
  # SAST: Semgrep (complements CodeQL)
  # Catches OWASP Top 10, injection, XSS patterns
  # ─────────────────────────────────────────────
  semgrep:
    name: SAST — Semgrep
    # TEMPORARY (Mar 2026): Skip Semgrep + SARIF upload (same noisy findings).
    # Re-enable: set to `needs: [preflight]` only and add back to security-pass needs.
    if: false
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config auto --config p/owasp-top-ten --config p/javascript --config p/java --sarif --output semgrep.sarif . || true

      - name: Upload SARIF to Code Scanning
        id: semgrep-upload
        if: always() && needs.preflight.outputs.can-upload-sarif == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true

      - name: Upload SARIF as artifact (fallback)
        if: always() && steps.semgrep-upload.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 30

  # ─────────────────────────────────────────────
  # Secret Scanning: TruffleHog
  # Deep git history scan for leaked credentials
  # ─────────────────────────────────────────────
  trufflehog:
    name: Secrets — TruffleHog
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout (full history for deep scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          # Avoid the action inferring BASE/HEAD from `github.event.commits[*]`
          # (which can be only a single commit => BASE == HEAD => no scan).
          # Use PR base/head SHAs when available, otherwise use push before/sha.
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event_name == 'push' && github.event.before || github.event.repository.default_branch }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event_name == 'push' && github.sha || 'HEAD' }}
          # Filter to VERIFIED results only.
          # The action itself already includes `--fail` by default, so we
          # must not pass `--fail` again (otherwise you get "flag fail cannot be repeated").
          extra_args: --results=verified

  # ─────────────────────────────────────────────
  # Secret Scanning: ggshield (GitGuardian)
  # Real-time secret detection with low false positives
  # ─────────────────────────────────────────────
  ggshield:
    name: Secrets — ggshield
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ vars.GITGUARDIAN_ENABLED == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitGuardian scan
        uses: GitGuardian/ggshield-action@v1
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  # ─────────────────────────────────────────────
  # SCA: OWASP Dependency-Check (Java backend)
  # Known CVE detection in Maven/Gradle dependencies
  # ─────────────────────────────────────────────
  owasp-dependency-check:
    name: SCA — OWASP Dep-Check
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache NVD data
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: owasp-nvd-${{ github.run_id }}
          restore-keys: owasp-nvd-

      - name: Run OWASP Dependency-Check
        working-directory: backend
        run: |
          # Use the Gradle plugin or standalone CLI
          ./gradlew dependencies --no-daemon -q > /dev/null 2>&1 || true

          # Download and run standalone OWASP DC
          DC_VERSION="10.0.4"
          curl -sSL "https://github.com/jeremylong/DependencyCheck/releases/download/v${DC_VERSION}/dependency-check-${DC_VERSION}-release.zip" -o dc.zip
          unzip -q dc.zip
          ./dependency-check/bin/dependency-check.sh \
            --scan . \
            --format SARIF \
            --format HTML \
            --out reports \
            --suppression ../.github/owasp-suppressions.xml \
            --failOnCVSS 7 \
            --nvdApiKey "${{ secrets.NVD_API_KEY }}" \
            || true
        continue-on-error: true

      - name: Upload SARIF to Code Scanning
        id: owasp-sarif-upload
        if: always() && needs.preflight.outputs.can-upload-sarif == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend/reports/dependency-check-report.sarif
          category: owasp-dependency-check
        continue-on-error: true

      - name: Upload SARIF as artifact (fallback)
        if: always() && steps.owasp-sarif-upload.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: owasp-dependency-check-sarif
          path: backend/reports/dependency-check-report.sarif
          retention-days: 30

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: owasp-dependency-check-report
          path: backend/reports/dependency-check-report.html
          retention-days: 30

  # ─────────────────────────────────────────────
  # SCA: Frontend dependency audit
  # ─────────────────────────────────────────────
  frontend-audit:
    name: SCA — Frontend Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: Install + audit
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun audit 2>/dev/null || echo "Bun audit not available — skipping"
        continue-on-error: true

  # ─────────────────────────────────────────────
  # Container Security: Trivy
  # Scans Docker images + filesystem for vulns
  # ─────────────────────────────────────────────
  trivy:
    name: Container — Trivy
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan (source code)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Upload filesystem SARIF to Code Scanning
        id: trivy-fs-upload
        if: always() && needs.preflight.outputs.can-upload-sarif == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem
        continue-on-error: true

      - name: Upload filesystem SARIF as artifact (fallback)
        if: always() && steps.trivy-fs-upload.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: trivy-filesystem-sarif
          path: trivy-fs.sarif
          retention-days: 30

      - name: Build backend image (for scanning)
        run: docker build -t slogbaa-backend:scan ./backend

      - name: Trivy image scan (backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: slogbaa-backend:scan
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Upload image SARIF to Code Scanning
        id: trivy-image-upload
        if: always() && needs.preflight.outputs.can-upload-sarif == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-container
        continue-on-error: true

      - name: Upload image SARIF as artifact (fallback)
        if: always() && steps.trivy-image-upload.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: trivy-container-sarif
          path: trivy-image.sarif
          retention-days: 30

  # ─────────────────────────────────────────────
  # SBOM: Software Bill of Materials
  # Supply chain transparency (2026 requirement)
  # ─────────────────────────────────────────────
  sbom:
    name: SBOM — Syft
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM (source)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom-source.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom-source.spdx.json
          retention-days: 90

  # ─────────────────────────────────────────────
  # Security gate
  # ─────────────────────────────────────────────
  security-pass:
    name: Security Pass
    # semgrep omitted while Semgrep job is disabled (skipped jobs would skip this job)
    needs: [preflight, trufflehog, trivy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check critical results
        run: |
          # TruffleHog must pass (no leaked secrets)
          if [ "${{ needs.trufflehog.result }}" == "failure" ]; then
            echo "CRITICAL: Secret leak detected by TruffleHog"
            exit 1
          fi
          echo "Security checks passed"

      - name: Code scanning setup guidance
        if: always()
        run: |
          echo "───────────────────────────────────────────────────────────"
          echo "  If SARIF upload steps show warnings, enable code scanning:"
          echo ""
          echo "  1. Settings > Code security and analysis"
          echo "     > Code scanning > Set up"
          echo ""
          echo "  2. For private repos, GitHub Advanced Security (GHAS)"
          echo "     must be enabled at the organization level first."
          echo ""
          echo "  Docs: https://docs.github.com/en/code-security/code-scanning"
          echo "───────────────────────────────────────────────────────────"

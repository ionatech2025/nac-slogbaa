# =============================================================================
# SLOGBAA DAST — Dynamic Application Security Testing
# Runs OWASP ZAP against staging environment after deployment
# =============================================================================

name: DAST

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to scan'
        required: true
        default: 'https://staging.slogbaa.org'
  workflow_run:
    workflows: [Deploy]
    types: [completed]
    branches: [main, dev]

concurrency:
  group: dast
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  # ─────────────────────────────────────────────
  # OWASP ZAP Baseline Scan
  # Non-intrusive passive + spider scan
  # ─────────────────────────────────────────────
  zap-baseline:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine target URL
        id: target
        run: |
          URL="${{ github.event.inputs.target_url || vars.STAGING_URL || 'https://staging.slogbaa.org' }}"
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "Scanning: ${URL}"

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ steps.target.outputs.url }}
          rules_file_name: .github/zap-rules.tsv
          cmd_options: '-a -j'
          artifact_name: zap-baseline-report
        continue-on-error: true

  # ─────────────────────────────────────────────
  # OWASP ZAP API Scan
  # Scans the backend API endpoints
  # ─────────────────────────────────────────────
  zap-api:
    name: OWASP ZAP API Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine API URL
        id: api-target
        run: |
          URL="${{ vars.STAGING_API_URL || 'https://staging-api.slogbaa.org' }}"
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: ${{ steps.api-target.outputs.url }}/api/
          format: openapi
          cmd_options: '-a -j'
          artifact_name: zap-api-report
        continue-on-error: true

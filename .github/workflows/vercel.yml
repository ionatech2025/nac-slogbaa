# =============================================================================
# SLOGBAA Vercel Frontend Deployment — March 2026
#
# Deploys the React frontend to Vercel after CI passes.
#
# Environments:
#   - dev branch    → Preview deployment (unique URL per commit)
#   - main branch   → Production deployment (slogbaa.vercel.app)
#   - Pull Requests → Preview deployment with PR comment link
#
# Prerequisites:
#   1. Install Vercel CLI: npm install -g vercel
#   2. Link project locally (creates gitignored .vercel — never committed):
#        cd frontend && vercel link
#   3. Add GitHub repository secrets (Settings → Secrets and variables → Actions):
#      - VERCEL_TOKEN         → Vercel account token (https://vercel.com/account/tokens)
#      - VERCEL_ORG_ID        → "orgId" from frontend/.vercel/project.json (after vercel link in frontend/)
#      - VERCEL_PROJECT_ID    → "projectId" from that same file
#   All three are required for `vercel deploy --prebuilt` in CI.
#   CI writes frontend/.vercel/project.json (same as local `cd frontend && vercel link`).
#   We do NOT run `vercel pull` in CI — it only syncs .env files for local dev and often fails on
#   API/token edge cases; the build already sets VITE_API_BASE_URL and Vercel env is in vercel.json.
#   Paste IDs with no extra quotes or spaces.
#   Fork PRs: GitHub does not expose secrets to workflows from forks — deploy will fail unless
#   the PR branch lives on the same repository.
#
# Troubleshooting "Could not retrieve Project Settings" on deploy:
#   That message is misleading in CI — there is no broken folder to delete on your laptop.
#   Vercel's API rejected the token + org + project combination. Fix:
#   1) Token: create a NEW token at vercel.com/account/tokens while logged in as a user who is
#      a MEMBER of the team that OWNS this Vercel project (not a read-only collaborator elsewhere).
#   2) IDs: Vercel dashboard → Project → Settings → General → copy Project ID.
#      Team id (orgId): Team Settings → copy Team ID (looks like team_...).
#      Re-paste into GitHub secrets; no quotes, no trailing spaces.
#   3) Optional secret VERCEL_SCOPE: your team SLUG from the URL (vercel.com/<slug>/...) if deploy
#      still fails — some accounts need explicit --scope on the CLI.
#   4) Simplest long-term: connect this GitHub repo in the Vercel dashboard (Import Project,
#      Root Directory = frontend) and let Vercel deploy on push — then you can drop CLI deploy.
#
# 2026 Standards:
#   - Waits for CI to pass before deploying (workflow_run trigger)
#   - Preview URLs on PRs via comment
#   - Production deploy only on main push
#   - Lighthouse CI audit on every deploy
#   - Concurrency groups prevent overlapping deploys
# =============================================================================

name: Vercel Deploy

on:
  push:
    branches: [main, dev]
    paths:
      - "frontend/**"
      - ".github/workflows/vercel.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "frontend/**"
      - ".github/workflows/vercel.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

concurrency:
  group: vercel-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  deployments: write

env:
  BUN_VERSION: "1.3"
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ─────────────────────────────────────────────
  # 1. Build & Validate (runs for all triggers)
  # ─────────────────────────────────────────────
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          VITE_API_BASE_URL: https://slogbaa.ionatec.com
      - name: Bundle size check
        run: |
          echo "── Bundle Analysis ──"
          TOTAL=$(du -sb dist/assets/ | cut -f1)
          TOTAL_KB=$((TOTAL / 1024))
          echo "Total assets: ${TOTAL_KB} KB"

          INITIAL=0
          for f in dist/assets/index-*.js; do
            [ -f "$f" ] || continue
            sz=$(stat -c%s "$f")
            [ "$sz" -gt "$INITIAL" ] && INITIAL=$sz
          done
          INITIAL_KB=$((INITIAL / 1024))
          echo "Largest index-*.js chunk: ${INITIAL_KB} KB"

          CSS=0
          for f in dist/assets/index-*.css; do
            [ -f "$f" ] || continue
            sz=$(stat -c%s "$f")
            [ "$sz" -gt "$CSS" ] && CSS=$sz
          done
          CSS_KB=$((CSS / 1024))
          echo "Largest index-*.css: ${CSS_KB} KB"

          if [ "$INITIAL" -gt 120000 ]; then
            echo "::warning::Largest index JS chunk exceeds 120 KB (${INITIAL_KB} KB) — review code splitting"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─────────────────────────────────────────────
  # 2. Deploy Preview (PRs + dev branch)
  # ─────────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    needs: [build]
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_name == 'dev') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'preview')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}

    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove stale .vercel directories (prevents link conflicts)
        run: rm -rf .vercel frontend/.vercel

      - name: Verify Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID must be repository secrets."
            echo "Fork PRs do not receive secrets — run from a branch on this repo, or merge from a branch here."
            echo "Local: cd frontend && vercel link && cat .vercel/project.json"
            exit 1
          fi

      # Vercel project root is frontend/ (vercel.json lives here). Link + deploy run from frontend/.
      - name: Link Vercel project (Root)
        shell: bash
        run: |
          mkdir -p .vercel
          echo "{\"orgId\":\"${{ secrets.VERCEL_ORG_ID }}\",\"projectId\":\"${{ secrets.VERCEL_PROJECT_ID }}\"}" > .vercel/project.json

      - name: Download build from Build & Validate job
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Prepare Vercel output
        run: |
          mkdir -p .vercel/output/static
          cp -r frontend/dist/* .vercel/output/static/
          cat > .vercel/output/config.json << 'CONF'
          {
            "version": 3,
            "routes": [
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          CONF

      - name: Deploy to Vercel (Preview)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Run from root; CLI will enter 'frontend' and find .vercel/output there
          URL=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN" --scope="${{ secrets.VERCEL_ORG_ID }}")
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const body = [
              '### Vercel Preview Deployment',
              '',
              `| Status | URL | Commit |`,
              `|--------|-----|--------|`,
              `| Deployed | [Open Preview](${url}) | \`${sha}\` |`,
              '',
              `> Built with Bun + Vite. [View build logs](${url}/_logs).`,
            ].join('\n');

            // Find existing comment to update instead of spamming
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Vercel Preview Deployment')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ─────────────────────────────────────────────
  # 3. Deploy Production (main branch only)
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy Production
    needs: [build]
    if: (github.event_name == 'push' && github.ref_name == 'main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove stale .vercel directories
        run: rm -rf .vercel frontend/.vercel

      - name: Verify Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID must be repository secrets."
            exit 1
          fi

      - name: Link Vercel project (Root)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          mkdir -p .vercel
          printf '%s\n' "{\"orgId\":\"$VERCEL_ORG_ID\",\"projectId\":\"$VERCEL_PROJECT_ID\"}" > .vercel/project.json

      - name: Download build from Build & Validate job
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Install Vercel CLI
        run: npm install -g vercel@50.37.3

      - name: Prepare Vercel output
        run: |
          mkdir -p .vercel/output/static
          cp -r frontend/dist/* .vercel/output/static/
          cat > .vercel/output/config.json << 'CONF'
          {
            "version": 3,
            "routes": [
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          CONF

      - name: Deploy to Vercel (Production)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --scope="${{ secrets.VERCEL_ORG_ID }}")
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Production deployed to: ${URL}"

  # ─────────────────────────────────────────────
  # 4. Post-deploy health check (production only)
  # Vercel Deployment Protection (SSO / password) returns 401/403 on *.vercel.app
  # and sometimes on prod — that still means the deployment is live. Do not use
  # curl -f here: on 401 curl exits non-zero and `|| echo 000` produced bogus
  # codes like "401000".
  # ─────────────────────────────────────────────
  health-check:
    name: Health Check
    needs: [deploy-preview, deploy-production]
    if: always() && needs.deploy-production.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Determine deployment URL
        id: url
        run: |
          URL="${{ needs.deploy-production.outputs.url || needs.deploy-preview.outputs.url }}"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Checking: ${URL}"

      - name: Wait for deployment to propagate
        run: sleep 10

      - name: Verify deployment responds
        run: |
          URL="${{ steps.url.outputs.url }}"
          for i in $(seq 1 6); do
            # No -f: we need the real status code; -f + || echo 000 mangles 401 into 401000
            HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || echo "000")
            echo "Attempt $i: HTTP ${HTTP_CODE}"
            case "$HTTP_CODE" in
              200|401|403)
                echo "Health check passed (deployment reachable; 401/403 = Vercel protection OK)"
                exit 0
                ;;
            esac
            sleep 10
          done
          echo "::warning::Deployment health check failed after 6 attempts"
          exit 1

      - name: Verify SPA routing works
        run: |
          URL="${{ steps.url.outputs.url }}"
          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 "${URL}/auth/login" || echo "000")
          echo "SPA route /auth/login: HTTP ${HTTP_CODE}"
          case "$HTTP_CODE" in
            200|401|403) echo "OK (200 or expected protection response)" ;;
            *) echo "::warning::SPA fallback routing may not be working" ;;
          esac

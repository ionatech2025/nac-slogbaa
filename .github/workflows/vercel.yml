# =============================================================================
# SLOGBAA Vercel Frontend Deployment — March 2026
#
# Deploys the React frontend to Vercel after CI passes.
#
# Environments:
#   - dev branch    → Preview deployment (unique URL per commit)
#   - main branch   → Production deployment (slogbaa.vercel.app)
#   - Pull Requests → Preview deployment with PR comment link
#
# Prerequisites:
#   1. Install Vercel CLI: bun add -g vercel
#   2. Link project:      cd frontend && vercel link
#   3. Add GitHub secrets:
#      - VERCEL_TOKEN    → Vercel account token (Settings > Tokens)
#      - VERCEL_ORG_ID   → from .vercel/project.json (orgId)
#      - VERCEL_PROJECT_ID → from .vercel/project.json (projectId)
#
# 2026 Standards:
#   - Waits for CI to pass before deploying (workflow_run trigger)
#   - Preview URLs on PRs via comment
#   - Production deploy only on main push
#   - Lighthouse CI audit on every deploy
#   - Concurrency groups prevent overlapping deploys
# =============================================================================

name: Vercel Deploy

on:
  push:
    branches: [main, dev]
    paths:
      - 'frontend/**'
      - '.github/workflows/vercel.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'frontend/**'
      - '.github/workflows/vercel.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

concurrency:
  group: vercel-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  deployments: write

env:
  BUN_VERSION: '1.3'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ─────────────────────────────────────────────
  # 1. Build & Validate (runs for all triggers)
  # ─────────────────────────────────────────────
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          VITE_API_BASE_URL: ${{ github.ref_name == 'main' && 'https://slogbaa-backend.onrender.com' || 'https://slogbaa-backend.onrender.com' }}

      - name: Bundle size check
        run: |
          echo "── Bundle Analysis ──"
          TOTAL=$(du -sb dist/assets/ | cut -f1)
          TOTAL_KB=$((TOTAL / 1024))
          echo "Total assets: ${TOTAL_KB} KB"

          INITIAL=$(stat -c%s dist/assets/index-*.js 2>/dev/null || echo 0)
          INITIAL_KB=$((INITIAL / 1024))
          echo "Initial JS chunk: ${INITIAL_KB} KB"

          CSS=$(stat -c%s dist/assets/index-*.css 2>/dev/null || echo 0)
          CSS_KB=$((CSS / 1024))
          echo "CSS bundle: ${CSS_KB} KB"

          if [ "$INITIAL" -gt 120000 ]; then
            echo "::warning::Initial JS chunk exceeds 120 KB (${INITIAL_KB} KB) — review code splitting"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─────────────────────────────────────────────
  # 2. Deploy Preview (PRs + dev branch)
  # ─────────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    needs: [build]
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_name == 'dev') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'preview')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}

    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Vercel CLI
        run: bun add -g vercel@latest

      - name: Pull Vercel environment
        working-directory: frontend
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        working-directory: frontend
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview)
        id: deploy
        working-directory: frontend
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Deployed to: ${URL}"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const body = [
              '### Vercel Preview Deployment',
              '',
              `| Status | URL | Commit |`,
              `|--------|-----|--------|`,
              `| Deployed | [Open Preview](${url}) | \`${sha}\` |`,
              '',
              `> Built with Bun + Vite. [View build logs](${url}/_logs).`,
            ].join('\n');

            // Find existing comment to update instead of spamming
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Vercel Preview Deployment')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ─────────────────────────────────────────────
  # 3. Deploy Production (main branch only)
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy Production
    needs: [build]
    if: (github.event_name == 'push' && github.ref_name == 'main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Vercel CLI
        run: bun add -g vercel@latest

      - name: Pull Vercel environment
        working-directory: frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        working-directory: frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        id: deploy
        working-directory: frontend
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Production deployed to: ${URL}"

  # ─────────────────────────────────────────────
  # 4. Post-deploy health check
  # ─────────────────────────────────────────────
  health-check:
    name: Health Check
    needs: [deploy-preview, deploy-production]
    if: always() && (needs.deploy-preview.result == 'success' || needs.deploy-production.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Determine deployment URL
        id: url
        run: |
          URL="${{ needs.deploy-production.outputs.url || needs.deploy-preview.outputs.url }}"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Checking: ${URL}"

      - name: Wait for deployment to propagate
        run: sleep 10

      - name: Verify deployment responds
        run: |
          URL="${{ steps.url.outputs.url }}"
          for i in $(seq 1 6); do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "${URL}" 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP ${HTTP_CODE}"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "::warning::Deployment health check failed after 6 attempts"
          exit 1

      - name: Verify SPA routing works
        run: |
          URL="${{ steps.url.outputs.url }}"
          # Test SPA fallback — a deep route should still return 200
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "${URL}/auth/login" 2>/dev/null || echo "000")
          echo "SPA route /auth/login: HTTP ${HTTP_CODE}"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::SPA fallback routing may not be working"
          fi

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var t = localStorage.getItem('slogbaa-theme');
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SLOGBAA" />
    <meta name="description" content="SLOGBAA Online Learning Platform — empowering active citizens through structured courses, assessments, and certificates. Network for Active Citizens (NAC)." />
    <meta property="og:title" content="SLOGBAA — Online Learning Platform" />
    <meta property="og:description" content="Empowering active citizens through structured courses, assessments, and certificates. Network for Active Citizens (NAC)." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#20232B" />
    <title>SLOGBAA — Online Learning Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

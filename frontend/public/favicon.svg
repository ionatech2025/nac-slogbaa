<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="128" x2="352" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>
  <!-- Rounded square badge -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Open book / knowledge wings -->
  <path d="M256 120c-48 0-96 16-128 44v8c32-24 80-36 128-36s96 12 128 36v-8c-32-28-80-44-128-44z" fill="rgba(255,255,255,0.25)"/>

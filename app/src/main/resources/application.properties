# =============================================================================
# SLOGBAA - Default and shared properties
# Override per environment with application-dev.properties or application-prod.properties
# Activate with: spring.profiles.active=dev | prod
# =============================================================================

spring.application.name=slogbaa

spring.profiles.active=dev

# ---------------------------------------------------------------------------
# Database (override via DATASOURCE_* env vars or profile-specific files)
# ---------------------------------------------------------------------------
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/slogbaa}
spring.datasource.username=${DATASOURCE_USERNAME:slogbaa}
spring.datasource.password=${DATASOURCE_PASSWORD:slogbaa}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------------------------
# JPA / Hibernate: do not manage schema; Flyway controls migrations
# ---------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ---------------------------------------------------------------------------
# Flyway: database migrations
# ---------------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

# ---------------------------------------------------------------------------
# IAM / JWT (override JWT_SECRET in production)
# ---------------------------------------------------------------------------
app.jwt.secret=${JWT_SECRET:default-secret-change-in-production-min-256-bits-for-hs256}
app.jwt.expiry-seconds=86400

# ---------------------------------------------------------------------------
# CORS - allowed origins for frontend (comma-separated)
# ---------------------------------------------------------------------------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.password-reset.base-url=${PASSWORD_RESET_BASE_URL:http://localhost:5173}

# ---------------------------------------------------------------------------
# File storage (uploads) - local filesystem
# ---------------------------------------------------------------------------
app.file.upload-dir=${FILE_UPLOAD_DIR:uploads}
app.file.max-size-bytes=5242880
app.file.allowed-image-types=image/jpeg,image/png,image/gif,image/webp

# Spring multipart limit (align with app.file.max-size-bytes)
spring.servlet.multipart.max-file-size=5MB

# ---------------------------------------------------------------------------
# Mail - Gmail SMTP (set GMAIL_USER and GMAIL_APP_PASS env vars)
# ---------------------------------------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

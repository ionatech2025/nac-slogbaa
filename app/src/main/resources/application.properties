spring.application.name=slogbaa

# ---------------------------------------------------------------------------
# Database (configure URL and credentials per environment)
# ---------------------------------------------------------------------------
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/slogbaa}
spring.datasource.username=${DATASOURCE_USERNAME:slogbaa}
spring.datasource.password=${DATASOURCE_PASSWORD:slogbaa}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate: do not manage schema; Flyway controls migrations
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ---------------------------------------------------------------------------
# Flyway: control database migrations
# ---------------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

# ---------------------------------------------------------------------------
# IAM / JWT (used by auth use cases and JWT filter)
# ---------------------------------------------------------------------------
app.jwt.secret=${JWT_SECRET:default-secret-change-in-production-min-256-bits-for-hs256}
app.jwt.expiry-seconds=86400

git # =============================================================================
# Production profile
# Use: spring.profiles.active=prod
# Set SMTP_* and JWT_SECRET (and DATASOURCE_*) via environment variables.
# =============================================================================

# ---------------------------------------------------------------------------
# Database - use env vars in production
# ---------------------------------------------------------------------------
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}

# ---------------------------------------------------------------------------
# JPA - production
# ---------------------------------------------------------------------------
spring.jpa.show-sql=false

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging.level.root=WARN
logging.level.com.nac.slogbaa=INFO

# ---------------------------------------------------------------------------
# SMTP - production mail (staff credentials, etc.)
# Set in deployment: SMTP_HOST, SMTP_PORT, SMTP_USERNAME, SMTP_PASSWORD
# ---------------------------------------------------------------------------
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---------------------------------------------------------------------------
# JWT - must be set in production
# ---------------------------------------------------------------------------
# app.jwt.secret=${JWT_SECRET}  (already in main application.properties with default; override with env)
app.jwt.expiry-seconds=86400

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------
server.port=${PORT:8080}

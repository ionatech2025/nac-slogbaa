# =============================================================================
# Development profile
# Use: spring.profiles.active=dev
# =============================================================================

# ---------------------------------------------------------------------------
# Database - local defaults
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/slogbaa
spring.datasource.username=slogbaa
spring.datasource.password=slogbaa

# ---------------------------------------------------------------------------
# JPA - dev convenience
# ---------------------------------------------------------------------------
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging.level.root=INFO
logging.level.com.nac.slogbaa=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG

# ---------------------------------------------------------------------------
# Mail - set GMAIL_USER and GMAIL_APP_PASS in your run configuration to enable.
# When unset, logging adapters are used instead.
# ---------------------------------------------------------------------------
spring.mail.username=${GMAIL_USER:}
spring.mail.password=${GMAIL_APP_PASS:}

# ---------------------------------------------------------------------------
# Server (optional)
# ---------------------------------------------------------------------------
server.port=8080

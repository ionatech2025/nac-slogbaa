# =============================================================================
# Development profile
# Use: spring.profiles.active=dev
# =============================================================================

# ---------------------------------------------------------------------------
# Database - local defaults
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/slogbaa
spring.datasource.username=slogbaa
spring.datasource.password=slogbaa

# ---------------------------------------------------------------------------
# JPA - dev convenience
# ---------------------------------------------------------------------------
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging.level.root=INFO
logging.level.com.nac.slogbaa=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG

# ---------------------------------------------------------------------------
# Mail - not configured in dev; staff credentials are logged only
# (LoggingEmailNotificationAdapter is used when JavaMailSender is absent)
# ---------------------------------------------------------------------------
# spring.mail.* left unset so no SMTP bean is created

# ---------------------------------------------------------------------------
# Server (optional)
# ---------------------------------------------------------------------------
server.port=8080

# =============================================================================
# Railway — backend service (monorepo)
#
# Default: build from repository root using ./Dockerfile (copies backend/).
# If you set Service "Root Directory" to `backend` instead, remove this file's
# duplicate or use backend/railway.toml + backend/Dockerfile only.
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
# Liveness, not readiness: /readiness includes DB and returns 503 until datasource + Flyway succeed,
# which often exceeds Railway's probe window or fails on misconfigured DATASOURCE_*.
healthcheckPath = "/actuator/health/liveness"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

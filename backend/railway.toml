# =============================================================================
# Railway Config — SLOGBAA Backend (only when Root Directory = "backend")
# https://docs.railway.com/config-as-code/reference
#
# If Railway builds from repo root (default), use ../Dockerfile + ../railway.toml
# instead. This file applies when the service Root Directory is set to `backend`.
#
# Environment variables to set in Railway dashboard (not in this file):
#   SPRING_PROFILES_ACTIVE = prod
#   PORT                   = 8080
#   DATASOURCE_URL         = jdbc:postgresql://<host>/<db>?sslmode=require
#   DATASOURCE_USERNAME    = <db-user>
#   DATASOURCE_PASSWORD    = <db-password>
#   JWT_SECRET             = <generated-secret>
#   CORS_ALLOWED_ORIGINS   = https://nac-slogbaa.vercel.app
#   PASSWORD_RESET_BASE_URL = https://nac-slogbaa.vercel.app
#   SMTP_HOST              = smtp.gmail.com
#   SMTP_PORT              = 587
#   SMTP_USERNAME          = <set-in-dashboard>
#   SMTP_PASSWORD          = <set-in-dashboard>
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**"]

[deploy]
# See root railway.toml — liveness avoids 503 from DB-bound readiness during deploy.
healthcheckPath = "/actuator/health/liveness"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

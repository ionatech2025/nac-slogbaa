# =============================================================================
# Railway Config — SLOGBAA Backend
# https://docs.railway.com/config-as-code/reference
#
# Place in repo root. Set "Root Directory" to /backend in Railway dashboard,
# or set the config file path to /railway.toml.
#
# Environment variables to set in Railway dashboard (not in this file):
#   SPRING_PROFILES_ACTIVE = prod
#   PORT                   = 8080
#   DATASOURCE_URL         = jdbc:postgresql://<host>/<db>?sslmode=require
#   DATASOURCE_USERNAME    = <db-user>
#   DATASOURCE_PASSWORD    = <db-password>
#   JWT_SECRET             = <generated-secret>
#   CORS_ALLOWED_ORIGINS   = https://nac-slogbaa.vercel.app
#   PASSWORD_RESET_BASE_URL = https://nac-slogbaa.vercel.app
#   SMTP_HOST              = smtp.gmail.com
#   SMTP_PORT              = 587
#   SMTP_USERNAME          = 2060newty@gmail.com
#   SMTP_PASSWORD          = oaxaojugozzakcfg
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**"]

[deploy]
healthcheckPath = "/actuator/health/readiness"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# =============================================================================
# Production profile
# Use: spring.profiles.active=prod
# REQUIRED env vars: JWT_SECRET, DATASOURCE_URL, DATASOURCE_USERNAME,
#                    DATASOURCE_PASSWORD, CORS_ALLOWED_ORIGINS (HTTPS only)
# =============================================================================

# ---------------------------------------------------------------------------
# Database - must be set via env vars in production
# ---------------------------------------------------------------------------
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}

# ---------------------------------------------------------------------------
# JPA - production
# ---------------------------------------------------------------------------
spring.jpa.show-sql=false
spring.flyway.repair-on-migrate=true

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging.level.root=WARN
logging.level.com.nac.slogbaa=INFO

# ---------------------------------------------------------------------------
# Email Provider - Resend (HTTP/HTTPS)
# Required because Railway (free/hobby) blocks outbound SMTP (ports 25, 465, 587)
# ---------------------------------------------------------------------------
app.email.enabled=false
app.email.provider=${EMAIL_PROVIDER:resend}
app.email.resend.api-key=${RESEND_API_KEY:}
app.email.resend.from=${RESEND_FROM:SLOGBAA <onboarding@resend.dev>}

# SMTP - production mail (DISABLED — use Resend instead)
# spring.mail.host=${SMTP_HOST:smtp.gmail.com}
# spring.mail.port=${SMTP_PORT:465}
# spring.mail.username=${SMTP_USERNAME:${GMAIL_USER:}}
# spring.mail.password=${SMTP_PASSWORD:${GMAIL_APP_PASS:}}
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.ssl.enable=true
# spring.mail.properties.mail.smtp.starttls.enable=false

# ---------------------------------------------------------------------------
# File storage — Cloudflare R2 (set R2_* env vars to enable, otherwise local)
# ---------------------------------------------------------------------------
# Allow larger uploads for library documents (20 MB)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

app.storage.type=${STORAGE_TYPE:local}
app.storage.r2.account-id=${R2_ACCOUNT_ID:}
app.storage.r2.access-key-id=${R2_ACCESS_KEY_ID:}
app.storage.r2.secret-access-key=${R2_SECRET_ACCESS_KEY:}
app.storage.r2.bucket=${R2_BUCKET:}
app.storage.r2.public-url=${R2_PUBLIC_URL:}

# app.email.* (provider, Resend) — see application.properties

# ---------------------------------------------------------------------------
# JWT - MUST be set via JWT_SECRET env var (>= 256 bits)
# ---------------------------------------------------------------------------
app.jwt.secret=${JWT_SECRET}
app.jwt.expiry-seconds=3600

# ---------------------------------------------------------------------------
# CORS - HTTPS-only origins required in prod
# ---------------------------------------------------------------------------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.password-reset.base-url=${PASSWORD_RESET_BASE_URL}

# ---------------------------------------------------------------------------
# Rate limiting - stricter in production
# ---------------------------------------------------------------------------
app.rate-limit.auth.max-requests=10
app.rate-limit.upload.max-requests=20
app.rate-limit.window-seconds=60

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------
server.port=${PORT:8080}

# ---------------------------------------------------------------------------
# Actuator / platform health (Railway, K8s)
# ---------------------------------------------------------------------------
# /actuator/health/readiness includes the datasource; it returns 503 until the DB is up and healthy.
# Railway is configured (railway.toml) to probe /actuator/health/liveness so deploys are not killed
# while Flyway/Neon is still warming. Monitor /actuator/health/readiness externally if you need DB-up.

# ---------------------------------------------------------------------------
# OpenAPI / Swagger — disabled in production
# ---------------------------------------------------------------------------
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# =============================================================================
# Development profile
# Use: spring.profiles.active=dev
# =============================================================================

# ---------------------------------------------------------------------------
# Flyway - repair on checksum mismatch (e.g. after editing applied migrations)
# ---------------------------------------------------------------------------
spring.flyway.repair-on-migrate=true

# ---------------------------------------------------------------------------
# Database — uses env vars if set, falls back to local defaults
# ---------------------------------------------------------------------------
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/slogbaa}
spring.datasource.username=${DATASOURCE_USERNAME:slogbaa}
spring.datasource.password=${DATASOURCE_PASSWORD:slogbaa}

# ---------------------------------------------------------------------------
# JPA - dev convenience
# ---------------------------------------------------------------------------
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging.level.root=INFO
logging.level.com.nac.slogbaa=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG

# ---------------------------------------------------------------------------
# Mail - uses SMTP_USERNAME/SMTP_PASSWORD (matches production and .env).
# Fallback: GMAIL_USER/GMAIL_APP_PASS for legacy run configs.
# Resend: set EMAIL_PROVIDER=resend, RESEND_API_KEY, RESEND_FROM in .env (see application.properties).
# ---------------------------------------------------------------------------
spring.mail.username=${SMTP_USERNAME:${GMAIL_USER:}}
spring.mail.password=${SMTP_PASSWORD:${GMAIL_APP_PASS:}}



# ---------------------------------------------------------------------------
# Frontend URL for email links (verification, password reset)
# Set via env PASSWORD_RESET_BASE_URL (see root .env). application.properties maps it to
# app.password-reset.base-url. With spring.profiles.active=dev, comma-separated values
# prefer http://localhost* over https:// so local dev matches Vite. With prod profile,
# https:// (e.g. https://nac-slogbaa.vercel.app) is preferred.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Server (optional)
# ---------------------------------------------------------------------------
server.port=8080

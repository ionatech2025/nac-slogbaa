# =============================================================================
# SLOGBAA - Default and shared properties
# Override per environment with application-dev.properties or application-prod.properties
# Activate with: spring.profiles.active=dev | prod
# =============================================================================

spring.application.name=slogbaa

spring.profiles.active=dev

# ---------------------------------------------------------------------------
# Java 21 Virtual Threads (Project Loom) — 2026 standard for Spring Boot 4
# ---------------------------------------------------------------------------
spring.threads.virtual.enabled=true

# ---------------------------------------------------------------------------
# Database (override via DATASOURCE_* env vars or profile-specific files)
# ---------------------------------------------------------------------------
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/slogbaa}
spring.datasource.username=${DATASOURCE_USERNAME:slogbaa}
spring.datasource.password=${DATASOURCE_PASSWORD:slogbaa}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------------------------
# JPA / Hibernate: do not manage schema; Flyway controls migrations
# ---------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ---------------------------------------------------------------------------
# Flyway: database migrations
# ---------------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

# ---------------------------------------------------------------------------
# IAM / JWT — MUST override JWT_SECRET in production (>= 256 bits)
# ---------------------------------------------------------------------------
app.jwt.secret=${JWT_SECRET:default-secret-change-in-production-min-256-bits-for-hs256}
app.jwt.expiry-seconds=86400
app.jwt.issuer=slogbaa-lms
app.jwt.audience=slogbaa-frontend

# ---------------------------------------------------------------------------
# CORS - allowed origins for frontend (comma-separated)
# ---------------------------------------------------------------------------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.password-reset.base-url=${PASSWORD_RESET_BASE_URL:http://localhost:5173}

# ---------------------------------------------------------------------------
# File storage (uploads) - local filesystem
# ---------------------------------------------------------------------------
app.file.upload-dir=${FILE_UPLOAD_DIR:uploads}
app.file.max-size-bytes=5242880
app.file.allowed-image-types=image/jpeg,image/png,image/gif,image/webp

# Spring multipart limit (align with app.file.max-size-bytes)
spring.servlet.multipart.max-file-size=5MB

# ---------------------------------------------------------------------------
# Rate limiting (per-IP sliding window)
# ---------------------------------------------------------------------------
app.rate-limit.auth.max-requests=20
app.rate-limit.upload.max-requests=30
app.rate-limit.window-seconds=60

# ---------------------------------------------------------------------------
# HikariCP — tuned for Neon serverless PostgreSQL
# ---------------------------------------------------------------------------
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=840000
spring.datasource.hikari.connection-test-query=SELECT 1

# ---------------------------------------------------------------------------
# Response compression
# ---------------------------------------------------------------------------
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript

# ---------------------------------------------------------------------------
# Actuator & Observability
# ---------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.metrics.tags.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true

# ---------------------------------------------------------------------------
# OpenAPI / SpringDoc — API documentation (Swagger UI at /swagger-ui.html)
# ---------------------------------------------------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.show-actuator=false
springdoc.default-produces-media-type=application/json

# ---------------------------------------------------------------------------
# Mail - Gmail SMTP (set GMAIL_USER and GMAIL_APP_PASS env vars)
# ---------------------------------------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Email API — shared by dev and prod. Default smtp uses JavaMailSender (Gmail above in dev, or SMTP_* in prod).
# Set EMAIL_PROVIDER=resend and RESEND_API_KEY to use Resend (HTTPS; works when outbound SMTP is blocked).
app.email.enabled=${EMAIL_ENABLED:true}
app.email.verification-required=${EMAIL_VERIFICATION_REQUIRED:true}
app.email.provider=${EMAIL_PROVIDER:smtp}
app.email.resend.api-key=${RESEND_API_KEY:}
app.email.resend.from=${RESEND_FROM:SLOGBAA <onboarding@resend.dev>}

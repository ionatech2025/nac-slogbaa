services:
  postgres:
    image: postgres:16-alpine
    container_name: slogbaa-db
    environment:
      POSTGRES_DB: slogbaa
      POSTGRES_USER: slogbaa
      POSTGRES_PASSWORD: slogbaa
    ports:
      - "5432:5432"
    volumes:
      - slogbaa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slogbaa -d slogbaa"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: slogbaa-app
    environment:
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/slogbaa
      DATASOURCE_USERNAME: slogbaa
      DATASOURCE_PASSWORD: slogbaa
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  slogbaa_pgdata:
